# TheFabVault — Production compose file
#
# Uses pre-built images from GHCR (ghcr.io/abeebe/thefabvault-*).
# GHA workflow builds + pushes images on every push to main, then
# triggers Portainer to pull latest and recreate containers.
#
# Volume layout (unchanged from bind-mount compose):
#   /app/storage  → /mnt/fabvault/storage  (CIFS, Unraid NAS via PVE host mp= passthrough)
#   /app/data     → /var/lib/fabvault/db   (ext4 local disk — SQLite requires POSIX locking)
#
# Required env vars (set in Portainer stack environment):
#   AUTH_USERNAME, AUTH_PASSWORD — one-time bootstrap only (migration v13).
#     Seed the initial admin into the `users` table on first boot only;
#     ignored on every later boot once that row exists. Harmless to leave
#     set, or remove after the first successful-seed log line. JWT_TTL
#     stays a plain env var (losing it just forces re-login, not a lockout).
#   JWT_TTL
#   CORS_ORIGINS, VITE_API_URL (baked into web image at build time by GHA)
#   API_PORT (default: 3005), WEB_PORT (default: 8085)
#   IMPORT_MOUNT_ON_STARTUP, IMPORT_MOUNT_EXTS, IMPORT_MAX_MB, IMPORT_MOUNT_PATHS
#
# JWT_SECRET is no longer required — if unset, one is generated and
# persisted in the DB (system_config.jwtSecret) on first boot. There is
# no hardcoded fallback secret in the app (removed in migration v13).
#
# GHA secrets required:
#   PORTAINER_URL, PORTAINER_API_KEY, PORTAINER_STACK_ID, PORTAINER_ENDPOINT_ID
#   VITE_API_URL (baked into web image at build time)

services:
  api:
    image: ghcr.io/abeebe/thefabvault-api:latest
    restart: unless-stopped
    init: true
    ports:
      - "${API_PORT:-3005}:3000"
    environment:
      PORT: "3000"
      AUTH_USERNAME: "${AUTH_USERNAME}"
      AUTH_PASSWORD: "${AUTH_PASSWORD}"
      JWT_SECRET: "${JWT_SECRET}"
      JWT_TTL: "${JWT_TTL:-43200}"
      STORAGE_DIR: "/app/storage"
      DATA_DIR: "/app/data"
      CORS_ORIGINS: "${CORS_ORIGINS:-http://localhost}"
      IMPORT_MOUNT_ON_STARTUP: "${IMPORT_MOUNT_ON_STARTUP:-false}"
      IMPORT_MOUNT_EXTS: "${IMPORT_MOUNT_EXTS:-}"
      IMPORT_MAX_MB: "${IMPORT_MAX_MB:-512}"
      IMPORT_MOUNT_PATHS: "${IMPORT_MOUNT_PATHS:-/imports/1,/imports/2,/imports/3}"
    cap_add:
      - SYS_ADMIN
    volumes:
      - /var/lib/fabvault/db:/app/data
      - /mnt/fabvault/storage:/app/storage
      - /mnt/fabvault/storage:/imports/1:ro
      - /mnt/fabvault/storage:/imports/2:ro
      - /mnt/fabvault/storage:/imports/3:ro
    stop_grace_period: 15s
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  web:
    image: ghcr.io/abeebe/thefabvault-web:latest
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-8085}:80"
    depends_on:
      api:
        condition: service_healthy
