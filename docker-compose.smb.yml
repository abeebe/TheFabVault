# TheFabVault — SMB/CIFS Storage Configuration (Docker-volume alternative)
#
# Use this file INSTEAD OF docker-compose.yml when you want Docker itself to manage
# SMB/CIFS mounts (no SYS_ADMIN capability needed; no Admin UI mount management).
# Asset storage AND the database live on the SMB server.
#
# Usage:
#   docker compose -f docker-compose.smb.yml up -d --build
#
# Host prerequisite:
#   Debian/Ubuntu:  sudo apt install cifs-utils
#   RHEL/Fedora:    sudo dnf install cifs-utils
#   Unraid:         CIFS is built-in
#
# Required .env vars:
#   SMB_STORAGE_HOST   — IP/hostname of the SMB server
#   SMB_STORAGE_SHARE  — Share path for assets       (e.g. fabvault/storage)
#   SMB_DATA_SHARE     — Share path for database     (e.g. fabvault/db)
#   SMB_USERNAME       — SMB username  (use "guest" for anonymous)
#   SMB_PASSWORD       — SMB password  (leave blank for guest)
#   SMB_VERSION        — SMB/CIFS protocol version (default: 3.0)
#
# Historical note (2026-07-12, #2078): this file used to also define up
# to 3 read-only "import" SMB volumes (fabvault-smb-import-1/2/3, each
# defaulting to the SAME SMB_STORAGE_SHARE when unset) for the mount-scan
# auto-import subsystem — that default-to-the-storage-share fallback is
# exactly the shape of bug that produced ~8,934 spurious asset rows in
# production on 2026-07-12 via a different compose file with the same
# self-referencing pattern. The mount-scan subsystem has been removed
# entirely (see git history for services/mountImport.ts) and the import
# volumes + IMPORT_MOUNT_* env vars below with it. Loading is done
# through the interface (browser upload + folder-tree project import)
# only.

services:
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    restart: unless-stopped
    init: true
    ports:
      - "${API_PORT:-3000}:3000"
    environment:
      PORT: "3000"
      AUTH_USERNAME: "${AUTH_USERNAME}"
      AUTH_PASSWORD: "${AUTH_PASSWORD}"
      JWT_SECRET: "${JWT_SECRET}"
      JWT_TTL: "${JWT_TTL:-43200}"
      STORAGE_DIR: "/app/storage"
      DATA_DIR: "/app/data"
      CORS_ORIGINS: "${CORS_ORIGINS:-http://localhost}"
    volumes:
      - fabvault-smb-storage:/app/storage
      - fabvault-smb-data:/app/data
    stop_grace_period: 15s
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
      args:
        VITE_API_URL: "${VITE_API_URL:-http://localhost:3000}"
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-80}:80"
    depends_on:
      api:
        condition: service_healthy

volumes:
  # ─── Primary storage (required) ───────────────────────────────────────────
  fabvault-smb-storage:
    driver: local
    driver_opts:
      type: cifs
      o: "username=${SMB_USERNAME:-guest},password=${SMB_PASSWORD:-},vers=${SMB_VERSION:-3.0},uid=1000,gid=1000,iocharset=utf8"
      device: "//${SMB_STORAGE_HOST}/${SMB_STORAGE_SHARE}"

  fabvault-smb-data:
    driver: local
    driver_opts:
      type: cifs
      o: "username=${SMB_USERNAME:-guest},password=${SMB_PASSWORD:-},vers=${SMB_VERSION:-3.0},uid=1000,gid=1000,iocharset=utf8"
      device: "//${SMB_DATA_HOST:-${SMB_STORAGE_HOST}}/${SMB_DATA_SHARE}"
