# TheFabVault — SMB/CIFS Storage Configuration (Docker-volume alternative)
#
# Use this file INSTEAD OF docker-compose.yml when you want Docker itself to manage
# SMB/CIFS mounts (no SYS_ADMIN capability needed; no Admin UI mount management).
# Asset storage AND the database live on the SMB server; up to 3 read-only import
# mounts are supported for scanning.
#
# Usage:
#   docker compose -f docker-compose.smb.yml up -d --build
#
# Host prerequisite:
#   Debian/Ubuntu:  sudo apt install cifs-utils
#   RHEL/Fedora:    sudo dnf install cifs-utils
#   Unraid:         CIFS is built-in
#
# Required .env vars:
#   SMB_STORAGE_HOST   — IP/hostname of the SMB server
#   SMB_STORAGE_SHARE  — Share path for assets       (e.g. fabvault/storage)
#   SMB_DATA_SHARE     — Share path for database     (e.g. fabvault/db)
#   SMB_USERNAME       — SMB username  (use "guest" for anonymous)
#   SMB_PASSWORD       — SMB password  (leave blank for guest)
#
# Optional per-import overrides (inherit SMB_* by default):
#   SMB_IMPORT_1_HOST  — override server for import slot 1
#   SMB_IMPORT_1_SHARE — share path for import slot 1 (e.g. media/3d-prints)
#   SMB_IMPORT_2_SHARE — share path for import slot 2
#   SMB_IMPORT_3_SHARE — share path for import slot 3
#   SMB_VERSION        — SMB/CIFS protocol version (default: 3.0)

services:
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    restart: unless-stopped
    init: true
    ports:
      - "${API_PORT:-3000}:3000"
    environment:
      PORT: "3000"
      AUTH_USERNAME: "${AUTH_USERNAME}"
      AUTH_PASSWORD: "${AUTH_PASSWORD}"
      JWT_SECRET: "${JWT_SECRET}"
      JWT_TTL: "${JWT_TTL:-43200}"
      STORAGE_DIR: "/app/storage"
      DATA_DIR: "/app/data"
      CORS_ORIGINS: "${CORS_ORIGINS:-http://localhost}"
      IMPORT_MOUNT_PATHS: "/imports/1,/imports/2,/imports/3"
      IMPORT_MOUNT_ON_STARTUP: "${IMPORT_MOUNT_ON_STARTUP:-true}"
      IMPORT_MOUNT_EXTS: "${IMPORT_MOUNT_EXTS:-}"
      IMPORT_MAX_MB: "${IMPORT_MAX_MB:-512}"
    volumes:
      - fabvault-smb-storage:/app/storage
      - fabvault-smb-data:/app/data
      - fabvault-smb-import-1:/imports/1:ro
      - fabvault-smb-import-2:/imports/2:ro
      - fabvault-smb-import-3:/imports/3:ro
    stop_grace_period: 15s
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
      args:
        VITE_API_URL: "${VITE_API_URL:-http://localhost:3000}"
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-80}:80"
    depends_on:
      api:
        condition: service_healthy

volumes:
  # ─── Primary storage (required) ───────────────────────────────────────────
  fabvault-smb-storage:
    driver: local
    driver_opts:
      type: cifs
      o: "username=${SMB_USERNAME:-guest},password=${SMB_PASSWORD:-},vers=${SMB_VERSION:-3.0},uid=1000,gid=1000,iocharset=utf8"
      device: "//${SMB_STORAGE_HOST}/${SMB_STORAGE_SHARE}"

  fabvault-smb-data:
    driver: local
    driver_opts:
      type: cifs
      o: "username=${SMB_USERNAME:-guest},password=${SMB_PASSWORD:-},vers=${SMB_VERSION:-3.0},uid=1000,gid=1000,iocharset=utf8"
      device: "//${SMB_DATA_HOST:-${SMB_STORAGE_HOST}}/${SMB_DATA_SHARE}"

  # ─── Import mounts (read-only) ────────────────────────────────────────────
  fabvault-smb-import-1:
    driver: local
    driver_opts:
      type: cifs
      o: "username=${SMB_USERNAME:-guest},password=${SMB_PASSWORD:-},vers=${SMB_VERSION:-3.0},uid=1000,gid=1000,ro,iocharset=utf8"
      device: "//${SMB_IMPORT_1_HOST:-${SMB_STORAGE_HOST}}/${SMB_IMPORT_1_SHARE:-${SMB_STORAGE_SHARE}}"

  fabvault-smb-import-2:
    driver: local
    driver_opts:
      type: cifs
      o: "username=${SMB_USERNAME:-guest},password=${SMB_PASSWORD:-},vers=${SMB_VERSION:-3.0},uid=1000,gid=1000,ro,iocharset=utf8"
      device: "//${SMB_IMPORT_2_HOST:-${SMB_STORAGE_HOST}}/${SMB_IMPORT_2_SHARE:-${SMB_STORAGE_SHARE}}"

  fabvault-smb-import-3:
    driver: local
    driver_opts:
      type: cifs
      o: "username=${SMB_USERNAME:-guest},password=${SMB_PASSWORD:-},vers=${SMB_VERSION:-3.0},uid=1000,gid=1000,ro,iocharset=utf8"
      device: "//${SMB_IMPORT_3_HOST:-${SMB_STORAGE_HOST}}/${SMB_IMPORT_3_SHARE:-${SMB_STORAGE_SHARE}}"
