name: Build and Push Docker Images

on:
  push:
    branches:
      - main

jobs:
  test:
    # Gates build-and-push below: a failing suite here stops the deploy.
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        workspace: [api, web]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ${{ matrix.workspace }}/package-lock.json

      - name: Install dependencies
        working-directory: ${{ matrix.workspace }}
        run: npm ci

      - name: Run tests
        working-directory: ${{ matrix.workspace }}
        run: npm test

  build-and-push:
    needs: test
    # NOTE: self-hosted runner is registered under five30am org, not abeebe personal account.
    # Until this repo is transferred to five30am (or a runner is added to abeebe account),
    # use ubuntu-latest (GitHub-hosted). Transfer to five30am to use self-hosted runner.
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU (for arm64 emulation on this amd64 runner)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract short SHA
        id: sha
        run: echo "short=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: ./api
          file: ./api/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/abeebe/thefabvault-api:latest
            ghcr.io/abeebe/thefabvault-api:${{ steps.sha.outputs.short }}

      - name: Build and push Web image
        uses: docker/build-push-action@v5
        with:
          context: ./web
          file: ./web/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            VITE_API_URL=${{ secrets.VITE_API_URL }}
            VITE_GIT_SHA=${{ steps.sha.outputs.short }}
          tags: |
            ghcr.io/abeebe/thefabvault-web:latest
            ghcr.io/abeebe/thefabvault-web:${{ steps.sha.outputs.short }}

      - name: Summary
        run: |
          echo "Multi-arch (linux/amd64, linux/arm64) images pushed to GHCR:"
          echo "  ghcr.io/abeebe/thefabvault-api:latest"
          echo "  ghcr.io/abeebe/thefabvault-web:latest"
          echo ""
          echo "This is Aaron's own production build track: the web image bakes in"
          echo "secrets.VITE_API_URL (the internal fabvault-api hostname), so :latest"
          echo "and :<sha> are NOT meant for general public self-hosting. Versioned"
          echo "releases (v*.*.* tags) are built separately by release.yml with a"
          echo "generic VITE_API_URL for that purpose."
          echo ""
          echo "Both platforms are built via Buildx with QEMU emulation for the"
          echo "arm64 leg. The arm64 build compiles better-sqlite3's native module"
          echo "under emulation -- verified working end-to-end on 2026-07-20 (full"
          echo "'docker buildx build --platform linux/arm64' of api/Dockerfile ran"
          echo "all stages to completion, including the native compile, and a"
          echo "repeat run returned a clean exit 0 off the shared build cache)."
          echo ""
          echo "Safe for the live stack: :latest is now a multi-arch manifest (an"
          echo "OCI image index with one entry per platform), not a single-platform"
          echo "image. 'docker pull'/'docker compose pull' on an amd64 host (the"
          echo "Docker host this stack runs on, 10.10.5.252) resolves that index to"
          echo "its amd64 entry automatically -- this is how every official"
          echo "multi-arch image (nginx, postgres, node, etc) already works, and"
          echo "portainer-image-watcher already requests the OCI image-index media"
          echo "type when checking for digest changes, so no watcher change is"
          echo "needed. Confirmed against portainer-image-watcher.sh and"
          echo "portainer-stack-redeploy.sh before this workflow change shipped."
          echo ""
          echo "Redeploy is handled by the VM-side watcher (portainer-image-watcher)."
          echo "Stack will pull new images automatically within 5 minutes."
