name: Build and Push Docker Images

on:
  push:
    branches:
      - main

jobs:
  test:
    # Gates build-and-push below: a failing suite here stops the deploy.
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        workspace: [api, web]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ${{ matrix.workspace }}/package-lock.json

      - name: Install dependencies
        working-directory: ${{ matrix.workspace }}
        run: npm ci

      - name: Run tests
        working-directory: ${{ matrix.workspace }}
        run: npm test

  build-and-push:
    needs: test
    # NOTE: self-hosted runner is registered under five30am org, not abeebe personal account.
    # Until this repo is transferred to five30am (or a runner is added to abeebe account),
    # use ubuntu-latest (GitHub-hosted). Transfer to five30am to use self-hosted runner.
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract short SHA
        id: sha
        run: echo "short=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: ./api
          file: ./api/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/abeebe/thefabvault-api:latest
            ghcr.io/abeebe/thefabvault-api:${{ steps.sha.outputs.short }}

      - name: Build and push Web image
        uses: docker/build-push-action@v5
        with:
          context: ./web
          file: ./web/Dockerfile
          platforms: linux/amd64
          push: true
          build-args: |
            VITE_API_URL=${{ secrets.VITE_API_URL }}
            VITE_GIT_SHA=${{ steps.sha.outputs.short }}
          tags: |
            ghcr.io/abeebe/thefabvault-web:latest
            ghcr.io/abeebe/thefabvault-web:${{ steps.sha.outputs.short }}

      - name: Summary
        run: |
          echo "amd64-only images pushed to GHCR (per-push build, single platform):"
          echo "  ghcr.io/abeebe/thefabvault-api:latest"
          echo "  ghcr.io/abeebe/thefabvault-web:latest"
          echo ""
          echo "This is Aaron's own production build track: the web image bakes in"
          echo "secrets.VITE_API_URL (the internal fabvault-api hostname), so :latest"
          echo "and :<sha> are NOT meant for general public self-hosting."
          echo ""
          echo "Per-push builds are amd64-only on purpose (#2049): the internal"
          echo "deploy target (ct-102, 10.10.5.252) is amd64-only, and the arm64 leg"
          echo "under QEMU emulation was taking ~75min per push, blocking deploys."
          echo "Dropping QEMU/arm64 from this hot path gets per-push builds back to"
          echo "~10-15min. arm64 packaging for public self-hosting is NOT lost -- it"
          echo "is built separately by release.yml (multi-arch: linux/amd64 +"
          echo "linux/arm64, with its own QEMU setup) on v*.*.* tag pushes, with a"
          echo "generic VITE_API_URL for that purpose."
          echo ""
          echo ":latest and :<sha> from this workflow are now single-platform"
          echo "(linux/amd64) images, not a multi-arch manifest. That matches the"
          echo "amd64-only deploy target (10.10.5.252) exactly, so 'docker pull'/"
          echo "'docker compose pull' there is unaffected."
          echo ""
          echo "Redeploy is handled by the VM-side watcher (portainer-image-watcher)."
          echo "Stack will pull new images automatically within 5 minutes."
