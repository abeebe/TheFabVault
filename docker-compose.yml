services:
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${API_PORT:-3000}:3000"
    environment:
      PORT: "3000"
      AUTH_USERNAME: "${AUTH_USERNAME}"
      AUTH_PASSWORD: "${AUTH_PASSWORD}"
      JWT_SECRET: "${JWT_SECRET}"
      JWT_TTL: "${JWT_TTL:-43200}"
      STORAGE_DIR: "/app/storage"
      DATA_DIR: "/app/data"
      CORS_ORIGINS: "${CORS_ORIGINS:-http://localhost}"
      IMPORT_MOUNT_PATH: "${IMPORT_MOUNT_PATH:-}"
      IMPORT_MOUNT_ON_STARTUP: "${IMPORT_MOUNT_ON_STARTUP:-true}"
      IMPORT_MOUNT_EXTS: "${IMPORT_MOUNT_EXTS:-}"
      IMPORT_MAX_MB: "${IMPORT_MAX_MB:-512}"
    volumes:
      - ./data/storage:/app/storage
      - ./data/db:/app/data
      - "${IMPORT_MOUNT_PATH_HOST:-./data/imports-stub}:/imports:ro"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
      args:
        VITE_API_URL: "${VITE_API_URL:-http://localhost:3000}"
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-80}:80"
    depends_on:
      api:
        condition: service_healthy
