services:
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    restart: unless-stopped
    init: true
    ports:
      - "${API_PORT:-3000}:3000"
    environment:
      PORT: "3000"
      AUTH_USERNAME: "${AUTH_USERNAME}"
      AUTH_PASSWORD: "${AUTH_PASSWORD}"
      JWT_SECRET: "${JWT_SECRET}"
      JWT_TTL: "${JWT_TTL:-43200}"
      STORAGE_DIR: "/app/storage"
      DATA_DIR: "/app/data"
      CORS_ORIGINS: "${CORS_ORIGINS:-http://localhost}"
    # SYS_ADMIN lets the API mount NFS/SMB shares inside the container (via Admin UI).
    # Safe to remove if you don't use the Network Mounts feature.
    cap_add:
      - SYS_ADMIN
    volumes:
      - ./data/storage:/app/storage
      - ./data/db:/app/data
    stop_grace_period: 15s
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
      args:
        VITE_API_URL: "${VITE_API_URL:-http://localhost:3000}"
        # Pass the host's current git short SHA into the build so the
        # sidebar can show which deploy is live. Set in your shell:
        #   export VITE_GIT_SHA=$(git rev-parse --short HEAD)
        # or it falls back to 'dev'.
        VITE_GIT_SHA: "${VITE_GIT_SHA:-dev}"
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-80}:80"
    depends_on:
      api:
        condition: service_healthy
