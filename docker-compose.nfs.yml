# TheFabVault — NFS Storage Configuration (Docker-volume alternative)
#
# Use this file INSTEAD OF docker-compose.yml when you want Docker itself to manage
# NFS mounts (no SYS_ADMIN capability needed; no Admin UI mount management).
# Asset storage AND the database live on the NFS server.
#
# Usage:
#   docker compose -f docker-compose.nfs.yml up -d --build
#
# Host prerequisite:
#   Debian/Ubuntu:  sudo apt install nfs-common
#   RHEL/Fedora:    sudo dnf install nfs-utils
#   Unraid:         NFS client is built-in
#
# Required .env vars:
#   NFS_STORAGE_HOST   — IP/hostname of the NFS server
#   NFS_STORAGE_PATH   — Exported path for assets    (e.g. /mnt/tank/fabvault/storage)
#   NFS_DATA_PATH      — Exported path for database  (e.g. /mnt/tank/fabvault/db)
#   NFS_VERSION        — NFS protocol version (default: 4; use 3 for older servers)
#
# Historical note (2026-07-12, #2078): this file used to also define up
# to 3 read-only "import" NFS volumes (fabvault-nfs-import-1/2/3, each
# defaulting to the SAME NFS_STORAGE_PATH when unset) for the mount-scan
# auto-import subsystem — that default-to-the-storage-path fallback is
# exactly the shape of bug that produced ~8,934 spurious asset rows in
# production on 2026-07-12 via a different compose file with the same
# self-referencing pattern. The mount-scan subsystem has been removed
# entirely (see git history for services/mountImport.ts) and the import
# volumes + IMPORT_MOUNT_* env vars below with it. Loading is done
# through the interface (browser upload + folder-tree project import)
# only.

services:
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    restart: unless-stopped
    init: true
    ports:
      - "${API_PORT:-3000}:3000"
    environment:
      PORT: "3000"
      AUTH_USERNAME: "${AUTH_USERNAME}"
      AUTH_PASSWORD: "${AUTH_PASSWORD}"
      JWT_SECRET: "${JWT_SECRET}"
      JWT_TTL: "${JWT_TTL:-43200}"
      STORAGE_DIR: "/app/storage"
      DATA_DIR: "/app/data"
      CORS_ORIGINS: "${CORS_ORIGINS:-http://localhost}"
    volumes:
      - fabvault-nfs-storage:/app/storage
      - fabvault-nfs-data:/app/data
    stop_grace_period: 15s
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
      args:
        VITE_API_URL: "${VITE_API_URL:-http://localhost:3000}"
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-80}:80"
    depends_on:
      api:
        condition: service_healthy

volumes:
  # ─── Primary storage (required) ───────────────────────────────────────────
  fabvault-nfs-storage:
    driver: local
    driver_opts:
      type: nfs
      o: "addr=${NFS_STORAGE_HOST},rw,nfsvers=${NFS_VERSION:-4},soft,timeo=30,retrans=3"
      device: ":${NFS_STORAGE_PATH}"

  fabvault-nfs-data:
    driver: local
    driver_opts:
      type: nfs
      o: "addr=${NFS_DATA_HOST:-${NFS_STORAGE_HOST}},rw,nfsvers=${NFS_VERSION:-4},soft,timeo=30,retrans=3"
      device: ":${NFS_DATA_PATH}"
